[alembic]
script_location = alembic
prepend_sys_path = .

# Timezone-aware, sortable revision file names (created_date_revision_slug).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sqlalchemy.url is deliberately left unset here. env.py overrides it at
# runtime from app.core.config.get_settings().DATABASE_URL, so the same
# environment variable that configures the running API also configures
# migrations -- one source of truth, no separate/out-of-sync connection
# string to maintain in this file. See env.py.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
